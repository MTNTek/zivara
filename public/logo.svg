  <!-- Bottom horizontal bar (slightly skewed left) -->
  <polygon points="20,78 85,78 85,88 15,88" fill="currentColor"/>
  <!-- Diagonal stripe 1 -->
  <polygon points="22,22 30,22 20,78 12,78" fill="currentColor"/>
  <!-- Diagonal stripe 2 -->
  <polygon points="38,22 46,22 36,78 28,78" fill="currentColor"/>
  <!-- Diagonal stripe 3 -->
  <polygon points="54,22 62,22 52,78 44,78" fill="currentColor"/>
  <!-- Diagonal stripe 4 -->
  <polygon points="70,22 78,22 68,78 60,78" fill="currentColor"/>
</svg>
